name: Weekly market data refresh

on:
  schedule:
    # Tuesdays 20:00 UTC (~1pm PT): Monday's daily pricing, the week-ending-
    # Saturday movement data, and Monday's EIA diesel print are all posted.
    # The FVWTRK freight PDF shown is the latest available (published Wed
    # for the prior Tuesday), so freight always reflects last week's survey.
    - cron: "0 20 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run data pipeline
        env:
          MARS_API_KEY: ${{ secrets.MARS_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python fetch_usda_pricing.py
          python fetch_freight_pdf.py
          python fetch_diesel.py
          python fetch_weather.py
          python build_summary.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history/ data/raw/*.json
          if git diff --cached --quiet; then
            echo "No data changes this run."
          else
            git commit -m "Weekly data refresh $(date -u +%F)"
            git push
          fi
